name: mcp-server CI

on:
  push:
    branches: [main]
    paths:
      - "mcp-server/**"
      - ".github/workflows/mcp-server-ci.yml"
  pull_request:
    paths:
      - "mcp-server/**"
      - "nm_capture.py"
      - "nm_inject.py"
      - ".claude/settings.json"
      - ".github/workflows/mcp-server-ci.yml"

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    defaults:
      run:
        working-directory: mcp-server
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: mcp-server/package-lock.json

      - name: Install
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Functional check (build + tests + protocol smoke + install round-trip + Python hooks)
        run: bash scripts/functional-check.sh
